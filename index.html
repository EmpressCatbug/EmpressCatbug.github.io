<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="welcome-page">
  <!-- Background Video (separate from loader container) -->
  <video autoplay muted loop playsinline id="background-video">
    <source src="assets/backgrounds/nebula1.mp4" type="video/mp4" />
    <source src="assets/backgrounds/nebula1.webm" type="video/webm">
  </video>

  <!-- Sparkle Trail & Butterfly Cursor -->
  <div id="sparkle-container"></div>
  <div class="butterfly-cursor"></div>

  <!-- Loader Content -->
  <div class="loader-container">
    <div class="overlay">
      <h1 id="typed-welcome" class="glow-text"></h1>
      <button id="enter-button" onclick="enterSite()">✨ Enter My Universe ✨</button>
    </div>
  </div>

<audio id="bgMusic" preload="auto">
  <source src="assets/Claude Debussy Claire De Lune added reverb.mp3" type="audio/mpeg">
</audio>
  
  <!-- Scripts -->
  <script src="script.js"></script>
  <script>
    const text = "Welcome";
    let i = 0;
    const target = document.getElementById("typed-welcome");

    function typeWelcome() {
      if (i < text.length) {
        target.textContent += text.charAt(i);
        i++;
        setTimeout(typeWelcome, 150);
      }
    }

    function enterSite() {
  const music = document.getElementById("bgMusic");

  localStorage.setItem("musicEnabled", "true");
  music.volume = 0.25;

  music.play().catch(() => {
    console.log("Music will resume on the next page.");
  });

 document.querySelector(".overlay").classList.add("fade-out");

  setTimeout(() => {
    localStorage.setItem("musicTime", music.currentTime);
    window.location.href = "home.html";
  }, 4000);
}

    window.onload = typeWelcome;
  </script>
</body>
</html>
