<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="loader.css" />
</head>
<body class="welcome-page">
  <!-- Background Video (separate from loader container) -->
  <video autoplay muted loop playsinline id="background-video">
    <source src="assets/backgrounds/nebula1.mp4" type="video/mp4" />
    <source src="assets/backgrounds/nebula1.webm" type="video/webm">
  </video>

  <!-- Sparkle Trail & Butterfly Cursor -->
  <div id="sparkle-container"></div>
  <div class="butterfly-cursor"></div>

  <!-- Loader Content -->
  <div class="loader-container">
    <div class="overlay">
      <h1 id="typed-welcome" class="glow-text"></h1>
      <button id="enter-button" onclick="enterSite()">Click to Enter</button>
    </div>
  </div>

  <!-- Video Transition -->
  <video id="transition-video" src="assets/backgrounds/FastStars.mp4" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 9999;"></video>

  <!-- Background Music -->
  <audio id="background-music" loop>
    <source src="assets/music/Claude Debussy Claire De Lune added reverb.wav" type="audio/wav">
  </audio>

  <!-- Music Controls -->
  <div id="music-controls">
    <button id="music-toggle" class="music-btn" title="Play/Pause Music">
      <span class="play-icon">▶</span>
      <span class="pause-icon" style="display: none;">⏸</span>
    </button>
    <input type="range" id="volume-slider" min="0" max="100" value="50" title="Volume">
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script>
    const text = "Welcome";
    let i = 0;
    const target = document.getElementById("typed-welcome");

    function typeWelcome() {
      if (i < text.length) {
        target.textContent += text.charAt(i);
        i++;
        setTimeout(typeWelcome, 150);
      }
    }

    function enterSite() {
      const loaderContainer = document.querySelector('.loader-container');
      const backgroundVideo = document.getElementById("background-video");
      const video = document.getElementById("transition-video");
      
      // Fade out the loader container
      loaderContainer.style.transition = "opacity 0.5s ease";
      loaderContainer.style.opacity = "0";
      
      // After fade out, show and play the transition video
      setTimeout(() => {
        loaderContainer.style.display = "none";
        backgroundVideo.style.display = "none";
        video.style.display = "block";
        video.play();
        
        // When video ends or after 3 seconds, navigate to home
        video.addEventListener('ended', () => {
          window.location.href = "home.html";
        });
        
        // Fallback in case video doesn't end properly
        setTimeout(() => {
          window.location.href = "home.html";
        }, 3000);
      }, 500);
    }

    window.onload = () => {
      typeWelcome();
      initMusicControls();
    };
    
    function initMusicControls() {
      const audio = document.getElementById('background-music');
      const musicToggle = document.getElementById('music-toggle');
      const volumeSlider = document.getElementById('volume-slider');
      
      if (!audio || !musicToggle || !volumeSlider) return;
      
      const playIcon = musicToggle.querySelector('.play-icon');
      const pauseIcon = musicToggle.querySelector('.pause-icon');
      
      // Load saved preferences
      const savedVolume = localStorage.getItem('musicVolume') || 50;
      const savedPlaying = localStorage.getItem('musicPlaying') === 'true';
      
      volumeSlider.value = savedVolume;
      audio.volume = savedVolume / 100;
      
      if (savedPlaying) {
        audio.play().catch(() => {
          // Auto-play might be blocked by browser
          console.log('Auto-play blocked by browser');
        });
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'inline';
      }
      
      // Toggle play/pause
      musicToggle.addEventListener('click', () => {
        if (audio.paused) {
          audio.play();
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'inline';
          localStorage.setItem('musicPlaying', 'true');
        } else {
          audio.pause();
          playIcon.style.display = 'inline';
          pauseIcon.style.display = 'none';
          localStorage.setItem('musicPlaying', 'false');
        }
      });
      
      // Volume control
      volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value / 100;
        localStorage.setItem('musicVolume', e.target.value);
      });
      
      // Pass music state to next page
      window.addEventListener('beforeunload', () => {
        localStorage.setItem('musicTime', audio.currentTime);
      });
    }
  </script>
</body>
</html>
